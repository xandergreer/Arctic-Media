{% extends "base.html" %}

{% block title %}Register - Arctic Media{% endblock %}

{% block content %}
<div class="auth-container"
    style="max-width: 400px; margin: 4rem auto; background: var(--surface-color); padding: 2rem; border-radius: var(--border-radius); box-shadow: var(--shadow-glow);">
    <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>

    <form id="registerForm">
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Username</label>
            <input type="text" id="username" required
                style="width: 100%; padding: 0.8rem; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 6px;">
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Password (Its
                Encrypted!)</label>
            <input type="password" id="password" required
                style="width: 100%; padding: 0.8rem; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 6px;">
        </div>

        <button type="submit" class="btn-primary"
            style="width: 100%; border: none; cursor: pointer; margin-top: 0;">Register</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
        Already have an account? <a href="/login" style="color: var(--primary-color);">Login</a>
    </div>

    <!-- Error/Success Message Container -->
    <div id="msg-box" style="margin-top: 1rem; text-align: center; display: none;"></div>
</div>
{% endblock %}
